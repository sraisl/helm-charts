name: Update Helm Chart

on:
  workflow_dispatch:
    inputs:
      chart:
        description: Chart directory name below charts/
        required: true
        type: string
      app_version:
        description: Application image tag to set as Chart appVersion, e.g. v1.0.0
        required: true
        type: string
      chart_version:
        description: Optional explicit Helm chart version. Defaults to patch bump.
        required: false
        type: string

jobs:
  update-chart:
    permissions:
      contents: write
      pull-requests: write

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install yq
        run: |
          YQ_VERSION=v4.44.3
          sudo wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Prepare chart update
        id: chart
        env:
          CHART: ${{ inputs.chart }}
          APP_VERSION: ${{ inputs.app_version }}
          CHART_VERSION: ${{ inputs.chart_version }}
        run: bash .github/scripts/prepare-chart-update.sh

      - name: Install Helm
        if: steps.chart.outputs.changed == 'true'
        uses: azure/setup-helm@v5
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Lint chart
        if: steps.chart.outputs.changed == 'true'
        run: helm lint "charts/${{ inputs.chart }}"

      - name: Create pull request
        if: steps.chart.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.chart.outputs.branch }}
          TITLE: ${{ steps.chart.outputs.title }}
          BODY: ${{ steps.chart.outputs.body }}
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
          git switch -c "$BRANCH"
          git add "charts/${{ inputs.chart }}/Chart.yaml"
          git commit -m "$TITLE"
          git push --force-with-lease origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" --title "$TITLE" --body "$BODY"
